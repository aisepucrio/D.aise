<section class="config-llm" aria-labelledby="config-llm-heading">
  <header class="config-llm-header">
    <h1 id="config-llm-heading" class="config-llm-title">Configuração do LLM</h1>
    <p class="config-llm-subtitle">Configure o modelo de linguagem utilizado na geração de documentação</p>
  </header>

  <form id="llm-config-form" class="config-llm-form" novalidate>
    <div class="form-field config-llm-field">
      <label for="llm-provider">Provedor do LLM</label>
      <select id="llm-provider" name="provider" class="config-llm-select config-llm-control-full">
        <option value="gemini" selected>Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="ollama">Ollama</option>
      </select>
    </div>

    <div class="credential-dynamic" id="credential-dynamic">
      <div class="credential-panel credential-panel--api" id="panel-api" aria-live="polite">
        <div class="config-llm-label-row">
          <label class="config-llm-label-block" for="api-key-input">Chave da API</label>
          <p class="credential-saved-msg" id="api-saved-msg" hidden>
            <span class="credential-saved-msg-icon" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </span>
            Salvo
          </p>
        </div>
        <div class="credential-inline-row">
          <input type="password" id="api-key-input" name="api_key" class="config-llm-input config-llm-control-full"
            placeholder="Chave da API" autocomplete="off" />
          <div class="credential-btn-wrap">
            <button type="button" id="btn-credential-api" class="btn-credential-action" disabled
              title="Confirmar chave">
              <span class="btn-credential-inner btn-credential-inner--plus" aria-hidden="true">+</span>
              <span class="btn-credential-inner btn-credential-inner--check" hidden aria-hidden="true">
                <svg class="btn-credential-check-svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M8 12l2.5 2.5L16 9" />
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>

      <div class="credential-panel credential-panel--ollama" id="panel-ollama" hidden aria-hidden="true">
        <div class="config-llm-label-row">
          <label class="config-llm-label-block" for="ollama-endpoint-input">URL do Endpoint Ollama</label>
          <p class="credential-saved-msg" id="ollama-saved-msg" hidden>
            <span class="credential-saved-msg-icon" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </span>
            Salvo
          </p>
        </div>
        <div class="credential-inline-row">
          <input type="url" id="ollama-endpoint-input" name="ollama_endpoint" class="config-llm-input config-llm-control-full"
            placeholder="Ex: http://localhost:11434" autocomplete="off" />
          <div class="credential-btn-wrap">
            <button type="button" id="btn-credential-ollama" class="btn-credential-action" disabled
              title="Confirmar endpoint">
              <span class="btn-credential-inner btn-credential-inner--plus" aria-hidden="true">+</span>
              <span class="btn-credential-inner btn-credential-inner--check" hidden aria-hidden="true">
                <svg class="btn-credential-check-svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M8 12l2.5 2.5L16 9" />
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="form-field config-llm-field">
      <label for="llm-model">Modelo</label>
      <select id="llm-model" name="model" class="config-llm-select config-llm-control-full">
        <option value="" disabled selected>Selecione um modelo</option>
      </select>
    </div>

    <div class="config-llm-inline-fields">
      <div class="form-field config-llm-field config-llm-field--inline">
        <label for="llm-temperature">
          Temperatura <span class="config-llm-label-hint">(0 - 1.0)</span>
        </label>
        <input type="number" id="llm-temperature" name="temperature" class="config-llm-input config-llm-control-full temperature-field"
          min="0" max="1.0" step="0.1" value="0" lang="pt-BR" />
      </div>

      <div class="form-field config-llm-field config-llm-field--inline">
        <label for="llm-tokens">Tokens</label>
        <input type="text" id="llm-tokens" name="tokens" class="config-llm-input config-llm-control-full" inputmode="numeric"
          autocomplete="off" value="0" />
      </div>
    </div>

    <div class="config-llm-actions">
      <button type="submit" class="btn-save-llm">Salvar configurações</button>
    </div>
  </form>

</section>
